# Pre-commit hooks: https://pre-commit.com
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: block-secrets-and-data
        name: Block secrets and personal data from being committed
        entry: python scripts/check_no_secrets.py
        language: system
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: pytest
        name: Run tests
        entry: pytest
        entry: bash -c 'cd . && PYTHONPATH=src pytest'
        language: system
        pass_filenames: false
